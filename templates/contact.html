{% extends "layout.html" %}

{% block title %}Dhanunjaya | Contact{% endblock %}

{% block content %}
<div class="container">
    <div style="max-width: 700px; margin: 0 auto;">
        <h2 class="section-title gradient-text" style="text-align: center;">Get in Touch</h2>
        <div class="glass-card">
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <input type="text" name="from_name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="from_email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Describe your project or just say hi!" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
            <p id="status" style="margin-top: 15px; text-align: center; color: var(--primary);"></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="{{ url_for('static', filename='javascript/contact.js') }}"></script>
{% endblock %}
